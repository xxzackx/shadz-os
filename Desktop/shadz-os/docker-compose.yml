services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shadz
      POSTGRES_PASSWORD: shadz
      POSTGRES_DB: shadz_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadz -d shadz_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SHADZ_OS_API_KEY: ${SHADZ_OS_API_KEY}
      DATABASE_URL: postgresql://shadz:shadz@db:5432/shadz_os
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
