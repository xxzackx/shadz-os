<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHADZ OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e2c36a;
      --gold-dim:   #7a5f28;
      --bg:         #000;
      --surface:    #0d0d0d;
      --surface-2:  #141414;
      --border:     #1e1e1e;
      --border-2:   #2a2520;
      --text:       #d4d0c8;
      --text-muted: #4a4540;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .panel {
      width: 100%;
      max-width: 400px;
    }

    /* ── Wordmark ── */
    .wordmark {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .wordmark-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .wordmark-sub {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* ── Cards (home screen) ── */
    .home-grid {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .home-card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 1.4rem 1.5rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .home-card:hover {
      border-color: var(--gold-dim);
      background: var(--surface-2);
    }

    .home-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .home-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      letter-spacing: 0.02em;
    }

    .home-card-arrow {
      float: right;
      color: var(--gold-dim);
      font-size: 1rem;
      margin-top: -1.35rem;
    }

    /* ── Section views ── */
    .section {
      display: none;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border-2);
      color: var(--text-muted);
      border-radius: 5px;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.35rem;
    }

    input {
      display: block;
      width: 100%;
      padding: 0.65rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.88rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--gold-dim); }

    .action-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }

    .action-btn:hover    { background: var(--gold-light); }
    .action-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* ── Messages ── */
    .msg {
      margin-top: 1rem;
      padding: 0.65rem 0.8rem;
      border-radius: 6px;
      font-size: 0.82rem;
      display: none;
      letter-spacing: 0.01em;
    }

    .msg.success { background: #120e00; border: 1px solid var(--gold-dim); color: var(--gold-light); }
    .msg.error   { background: #1a0000; border: 1px solid #5a1e1e;         color: #e07070; }

    /* ── Stats box ── */
    .stats-box {
      margin-top: 1rem;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: var(--surface);
    }

    .stats-row + .stats-row { border-top: 1px solid var(--border); }

    .stats-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stats-value { font-size: 0.95rem; color: var(--text); font-weight: 500; }
    .stats-value.gold { color: var(--gold); font-size: 1.15rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="panel">

    <div class="wordmark">
      <div class="wordmark-title">SHADZ OS</div>
      <div class="wordmark-sub">Control Panel</div>
    </div>

    <!-- Home screen -->
    <div id="home" class="home-grid">
      <div class="home-card" onclick="show('updateSection')">
        <div class="home-card-title">Update Redirect Link</div>
        <div class="home-card-desc">Change where a slug points</div>
        <div class="home-card-arrow">›</div>
      </div>
      <div class="home-card" onclick="show('statsSection')">
        <div class="home-card-title">Check Stats</div>
        <div class="home-card-desc">View destination and scan count for a slug</div>
        <div class="home-card-arrow">›</div>
      </div>
    </div>

    <!-- Update redirect section -->
    <div id="updateSection" class="section">
      <div class="section-header">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <span class="section-title">Update Redirect</span>
      </div>

      <label for="u-slug">Slug</label>
      <input type="text" id="u-slug" placeholder="a" autocomplete="off" />

      <label for="u-targetUrl">New Redirect URL</label>
      <input type="url" id="u-targetUrl" placeholder="https://example.com" />

      <button class="action-btn" id="u-btn" onclick="updateRedirect()">Update Redirect Link</button>
      <div id="u-msg" class="msg"></div>
    </div>

    <!-- Stats section -->
    <div id="statsSection" class="section">
      <div class="section-header">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <span class="section-title">Scan Stats</span>
      </div>

      <label for="s-slug">Slug</label>
      <input type="text" id="s-slug" placeholder="a" autocomplete="off" />

      <button class="action-btn" id="s-btn" onclick="checkStats()">Check Stats</button>

      <div id="statsBox" class="stats-box">
        <div class="stats-row">
          <span class="stats-label">Slug</span>
          <span class="stats-value" id="statSlug">—</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">Destination</span>
          <span class="stats-value" id="statDest" style="word-break:break-all;text-align:right;max-width:68%">—</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">Total Scans</span>
          <span class="stats-value gold" id="statScans">—</span>
        </div>
      </div>

      <div id="s-msg" class="msg"></div>
    </div>

  </div>

  <script>
    function show(sectionId) {
      document.getElementById('home').style.display = 'none';
      document.getElementById(sectionId).style.display = 'block';
    }

    function goHome() {
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById('home').style.display = 'flex';
      document.getElementById('statsBox').style.display = 'none';
      ['u-msg', 's-msg'].forEach(id => {
        const el = document.getElementById(id);
        el.style.display = 'none';
        el.className = 'msg';
      });
    }

    async function updateRedirect() {
      const slug      = document.getElementById('u-slug').value.trim();
      const targetUrl = document.getElementById('u-targetUrl').value.trim();
      const btn       = document.getElementById('u-btn');

      if (!slug || !targetUrl) {
        showMsg('u-msg', 'error', 'Slug and destination URL are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        // credentials: 'same-origin' sends the browser's cached Basic Auth
        // credentials automatically — no API key needed in the UI.
        const res  = await fetch(`/admin/link/${encodeURIComponent(slug)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ destination_url: targetUrl }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('u-msg', 'success', `Updated: /${data.slug} → ${data.destination_url}`);
        } else {
          showMsg('u-msg', 'error', data.detail || `Error ${res.status}`);
        }
      } catch {
        showMsg('u-msg', 'error', 'Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Redirect Link';
      }
    }

    async function checkStats() {
      const slug = document.getElementById('s-slug').value.trim();
      const btn  = document.getElementById('s-btn');

      document.getElementById('statsBox').style.display = 'none';
      const msgEl = document.getElementById('s-msg');
      msgEl.style.display = 'none';

      if (!slug) {
        showMsg('s-msg', 'error', 'Slug is required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Loading…';

      try {
        // credentials: 'same-origin' sends the browser's cached Basic Auth
        // credentials automatically — no API key needed in the UI.
        const res  = await fetch(`/admin/link/${encodeURIComponent(slug)}`, {
          credentials: 'same-origin',
        });
        const data = await res.json();

        if (res.ok) {
          document.getElementById('statSlug').textContent  = data.slug;
          document.getElementById('statDest').textContent  = data.destination_url;
          document.getElementById('statScans').textContent = data.scan_count;
          document.getElementById('statsBox').style.display = 'block';
        } else {
          showMsg('s-msg', 'error', data.detail || `Error ${res.status}`);
        }
      } catch {
        showMsg('s-msg', 'error', 'Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Stats';
      }
    }

    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
