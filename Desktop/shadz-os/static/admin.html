<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHADZ OS — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    h1 span { color: #6ee7b7; }

    hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 1.5rem 0;
    }

    h2 {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    input {
      display: block;
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e2e2e2;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #6ee7b7; }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #6ee7b7;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }

    button:hover { background: #34d399; }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    button.secondary {
      background: #1f2937;
      color: #6ee7b7;
      border: 1px solid #374151;
    }

    button.secondary:hover { background: #374151; }

    .msg {
      margin-top: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }

    .msg.success { background: #052e16; border: 1px solid #166534; color: #6ee7b7; }
    .msg.error   { background: #2d0a0a; border: 1px solid #7f1d1d; color: #fca5a5; }

    .stats-box {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      display: none;
    }

    .stats-box .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
    }

    .stats-box .stat-row + .stat-row {
      border-top: 1px solid #1e1e1e;
    }

    .stats-box .stat-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
    .stats-box .stat-value { font-size: 0.9rem; color: #e2e2e2; font-weight: 500; }
    .stats-box .stat-value.highlight { color: #6ee7b7; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SHADZ OS <span>/ Admin</span></h1>

    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="••••••••••••" autocomplete="off" />

    <!-- Update redirect -->
    <h2>Update Redirect</h2>

    <label for="clientId">Client ID</label>
    <input type="text" id="clientId" placeholder="tag-abc-001" autocomplete="off" />

    <label for="targetUrl">New Redirect URL</label>
    <input type="url" id="targetUrl" placeholder="https://example.com/page" />

    <button id="updateBtn" onclick="updateRedirect()">Update Redirect Link</button>
    <div id="updateMsg" class="msg"></div>

    <hr />

    <!-- Stats -->
    <h2>Scan Stats</h2>

    <label for="statsClientId">Client ID</label>
    <input type="text" id="statsClientId" placeholder="tag-abc-001" autocomplete="off" />

    <button id="statsBtn" class="secondary" onclick="checkStats()">Check Stats</button>

    <div id="statsBox" class="stats-box">
      <div class="stat-row">
        <span class="stat-label">Total Scans</span>
        <span class="stat-value highlight" id="statScans">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Latest Scan</span>
        <span class="stat-value" id="statLatest">—</span>
      </div>
    </div>

    <div id="statsMsg" class="msg"></div>
  </div>

  <script>
    async function updateRedirect() {
      const apiKey    = document.getElementById('apiKey').value.trim();
      const clientId  = document.getElementById('clientId').value.trim();
      const targetUrl = document.getElementById('targetUrl').value.trim();
      const btn       = document.getElementById('updateBtn');

      if (!apiKey || !clientId || !targetUrl) {
        showMsg('updateMsg', 'error', 'All fields are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res  = await fetch('/admin/nfc', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
          body: JSON.stringify({ client_id: clientId, new_target_url: targetUrl }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('updateMsg', 'success', `Updated: ${data.tag_id} → ${data.target_url}`);
        } else {
          showMsg('updateMsg', 'error', data.detail || `Error ${res.status}`);
        }
      } catch {
        showMsg('updateMsg', 'error', 'Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Redirect Link';
      }
    }

    async function checkStats() {
      const apiKey   = document.getElementById('apiKey').value.trim();
      const clientId = document.getElementById('statsClientId').value.trim();
      const btn      = document.getElementById('statsBtn');
      const box      = document.getElementById('statsBox');

      box.style.display = 'none';
      hideMsg('statsMsg');

      if (!apiKey || !clientId) {
        showMsg('statsMsg', 'error', 'API key and Client ID are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Loading…';

      try {
        const res  = await fetch(`/nfc/${encodeURIComponent(clientId)}/stats`, {
          headers: { 'X-API-Key': apiKey },
        });
        const data = await res.json();

        if (res.ok) {
          document.getElementById('statScans').textContent  = data.total_scans;
          document.getElementById('statLatest').textContent =
            data.latest_scan_time ? new Date(data.latest_scan_time).toLocaleString() : 'Never';
          box.style.display = 'block';
        } else {
          showMsg('statsMsg', 'error', data.detail || `Error ${res.status}`);
        }
      } catch {
        showMsg('statsMsg', 'error', 'Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Stats';
      }
    }

    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
      el.style.display = 'block';
    }

    function hideMsg(id) {
      const el = document.getElementById(id);
      el.style.display = 'none';
      el.className = 'msg';
    }
  </script>
</body>
</html>
